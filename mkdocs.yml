site_name: SegPaste
site_url: https://NoeFontana.github.io/segpaste
repo_url: https://github.com/NoeFontana/segpaste
repo_name: NoeFontana/segpaste

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
             docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - API Reference: api.md
  - ADRs:
      - ADR-0001 Dense-Sample Composites: adrs/0001-dense-sample.md
      - ADR-0002 Performance Baseline: adrs/0002-performance-baseline.md
      - ADR-0003 Hard Deprecation Stance: adrs/0003-hard-deprecation-stance.md
      - ADR-0004 Batched Dense Sample: adrs/0004-batched-dense-sample.md
      - ADR-0005 Dense Composite: adrs/0005-dense-composite.md
      - ADR-0006 Panoptic Paste: adrs/0006-panoptic-paste.md
      - ADR-0007 Depth-Aware Paste: adrs/0007-depth-aware-paste.md
      - ADR-0008 Batch Copy-Paste (GPU): adrs/0008-batch-copy-paste.md
