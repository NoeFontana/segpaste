# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up uv and cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install dependencies
        run: |
          uv sync --python ${{ matrix.python-version }} --all-groups

      - name: Format
        # Use `uv run` to execute commands from the virtual environment
        run: uv run ruff format --check .

      - name: Lint
        # Use `uv run` to execute commands from the virtual environment
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Test with pytest
        timeout-minutes: 10
        run: |
          start=$(date +%s)
          uv run pytest
          end=$(date +%s)
          echo "pytest wall-clock: $((end - start))s"

      - name: Compile-clean gate
        # ADR-0008 §D7: torch._dynamo.explain on CPU trace must report zero
        # graph-break reasons outside scripts/compile_allowlist.txt.
        run: uv run python scripts/compile_explain.py

      - name: Upload KS soft-report artifact
        # ADR-0008 §D6: 30-day burn-in records KS distances without asserting.
        # After the burn-in closes, test_batch_copy_paste_ks.py is hardened.
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v4
        with:
          name: ks-report-${{ github.run_id }}
          path: ks_report/
          if-no-files-found: ignore
          retention-days: 30

